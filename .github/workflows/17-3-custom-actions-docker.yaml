name: 17 - 3 - Custom Actions - Docker
run-name: 17 - 3 - Custom Actions - Docker
on:
  workflow_dispatch:
    inputs:
      url:
        type: choice
        options:
          - 'https://www.google.com'
          - 'unreachable.com'
          - 'hello.py'
      max_trials:
        description: Maximum number of trials until action fails
        default: '10'
        required: false
      delay:
        description: Delay in seconds between trials.
        default: '5'
        required: false


jobs:
  ping-url:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Needed for the composite action to be available in the workflow when the action is within the same repository
      - name: PING URL
        uses: ./.github/actions/docker-ping-url
        with:
          url: ${{ inputs.url}}
          max_trials: ${{ inputs.max_trials}}
          delay: ${{ inputs.delay}}

