name: 16 - Working with Environments
on:
  workflow_dispatch:

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    env:
      my-env-value: ${{ vars.MY_ENV_VALUE || 'default-value' }}
    steps:
    - name: Echo environment value
      run: echo "Deploying to staging..."

  e2e-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: success()
    steps:
      - name: E2E Tests
        run: echo "Running E2E tests on staging environment..."

  deploy-production:
    runs-on: ubuntu-latest
    needs: e2e-tests
    if: success()
    environment: prod
    env:
      my-env-value: ${{ vars.MY_ENV_VALUE || 'default-value' }}
    steps:
      - name: Echo environment value
        run: echo "Deploying to production..."