name: 17 - 2 - Custom Actions - JS
run-name: 17 - 2 - Custom Actions - JS
on:
  workflow_dispatch:
    inputs:
      base-branch:
        type: string
        default: main
      target-branch:
        type: string
        default: update-dependencies
      working-dir:
        type: string
        default: ./react-app


jobs:
  dependency-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Needed for the composite action to be available in the workflow when the action is within the same repository
      - name: Setup Node and NPM Dependencies
        uses: ./.github/actions/js-dependency-update
        with:
          base-branch: ${{ inputs.base-branch}}
          target-branch: ${{ inputs.target-branch }}
          working-directory: ${{ inputs.working-dir }}

