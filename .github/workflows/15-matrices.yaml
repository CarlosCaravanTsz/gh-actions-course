name: 15 - Working with Matrices
on:
  workflow_dispatch:

jobs:
  backwards-compatibility:
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }}-${{ matrix.node-version }}
    strategy:
      fail-fast: false
      matrix:
        node-version: ['24.x', '26.x']
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            node-version: '16.x'
          - os: ubuntu-latest
            node-version: '26.x'
            tag: experimental
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Fail if experimental
        if: matrix.tag == 'experimental'
        run: exit 1
      - name: Perform some tests
        run: |
          echo "Running tests on Node.js version ${{ matrix.node-version }} on ${{ matrix.os }}"
          sleep 10
      - name: Upload test results
        run: echo "Loading test results..."

  include-example:
    runs-on: ubuntu-latest
    name: ${{ matrix.color }} - ${{ matrix.shape }} - ${{ matrix.size}} - ${{ matrix.opacity }}
    strategy:
      matrix:
        color: [red, green]
        shape: [circle, square]
        size: [small, large]
        include:
          - color: red
            opacity: 75
          - shape: circle
            opacity: 100
          - color: red
            shape: triangle
          - opacity: 50 # The lower it stays, it takes precedence
          - color: green
            shape: circle
            size: small
        exclude: # Processed before the exclude
          - color: green
            shape: circle
    steps:
      - name: Dummy step
        run: echo "Running tests on ${{ matrix.color }} - ${{ matrix.shape }} - ${{ matrix.size }} - ${{ matrix.opacity }}"

