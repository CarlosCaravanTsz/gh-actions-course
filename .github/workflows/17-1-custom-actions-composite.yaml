name: 17 - 1 - Custom Actions - Composite
on:
  workflow_dispatch:
    inputs:
      target-env:
        description: "target env"
        type: choice
        options:
          - dev
          - prod
        default: dev
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Needed for the composite action to be available in the workflow when the action is within the same repository
      - name: Setup Node and NPM Dependencies
        uses: ./.github/actions/composite-cache
        with:
          node-version: 20.x
          working-dir: ./react-app
      - name: Test
        run: npm run test
        working-directory: ./react-app
      - name: Build
        run: npm run build
        working-directory: ./react-app